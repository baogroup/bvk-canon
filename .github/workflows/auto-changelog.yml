name: Auto changelog

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  auto-changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update AUTO_CHANGELOG
        run: python scripts/update_auto_changelog.py

      - name: Commit AUTO_CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CURRENT/00_INDEX/AUTO_CHANGELOG.txt
          git diff --cached --quiet && exit 0
          git commit -m "bot: update AUTO_CHANGELOG"
          git push
