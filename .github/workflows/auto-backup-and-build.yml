name: Auto backup and build public read

on:
  push:
    branches: [main]
    paths:
      - 'CURRENT/**'
      - 'scripts/**'
      - '.github/workflows/auto-backup-and-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Backup changed files and rebuild PUBLIC_READ
        run: python scripts/backup_and_build.py

      - name: Commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSIONS PUBLIC_READ
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Auto backup and rebuild public read"
          git push
